# scripted/written by Robert Bopko (github.com/zeroznet) with Boba Bott (Claude Opus 4.7)

name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions: read-all

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          set -eu
          out=$(gofmt -l .)
          if [ -n "${out}" ]; then
            echo "::error::unformatted files:"
            printf '%s\n' "${out}"
            exit 1
          fi

      - name: go vet
        run: |
          set -eu
          go vet ./...
          go vet -tags=integration ./...

      - name: go mod verify
        run: go mod verify

      # govulncheck runs but does not gate the build while the alpine apk go
      # package (build/Dockerfile.rootfs's go=X.Y.Z-rN pin) lags upstream Go.
      # Re-enable strict mode once apk ships the Go release that closes the
      # currently flagged stdlib CVEs.
      - name: govulncheck
        continue-on-error: true
        run: |
          set -eu
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Unit tests
        run: go test -count=1 ./...

      - name: Ensure /dev/net/tun is accessible
        run: |
          set -eu
          sudo modprobe tun || true
          sudo chmod 0666 /dev/net/tun
          ls -la /dev/net/tun

      - name: Integration tests
        run: |
          set -eu
          sudo -E env "PATH=$PATH" go test -count=1 -tags=integration ./...

      - name: Build verify
        run: |
          set -eu
          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags "-s -w -buildid=" \
            -o /dev/null \
            ./cmd/wsl-vpnfix

      - name: Race detector (CGO required)
        run: |
          set -eu
          CGO_ENABLED=1 go test -race -count=1 ./...
